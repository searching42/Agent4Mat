name: Agent4Mat CI

on:
  workflow_dispatch:
    inputs:
      run_external_acceptance:
        description: "Run external-chain acceptance job"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      run_real_chain_acceptance:
        description: "Run real-chain minimal acceptance job"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      run_real_no_fallback_gate:
        description: "Run strict real no-fallback gate job"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      run_ui_freeze_acceptance:
        description: "Run UI freeze acceptance job"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      run_ui_audit_acceptance:
        description: "Run UI audit acceptance job"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      run_ui_release_readiness:
        description: "Run UI release-readiness job"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      run_ui_acceptance_bundle:
        description: "Run UI acceptance bundle (freeze+audit+readiness)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  push:
  pull_request:

jobs:
  intake-contract-guard:
    name: intake contract guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU profile
        run: ./scripts/install_profile.sh cpu

      - name: Run intake contract guard
        run: make intake-contract-guard

  step-mode-guard:
    name: step mode guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU profile
        run: ./scripts/install_profile.sh cpu

      - name: Run step mode guard
        run: make step-mode-guard

  web-evidence-guard:
    name: web evidence guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU profile
        run: ./scripts/install_profile.sh cpu

      - name: Run web evidence guard
        run: make web-evidence-guard

  experiment-trace-guard:
    name: experiment trace guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU profile
        run: ./scripts/install_profile.sh cpu

      - name: Run experiment trace guard
        run: make experiment-trace-guard

  real-no-fallback-gate:
    name: acceptance real no-fallback (manual)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_real_no_fallback_gate == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU profile
        run: ./scripts/install_profile.sh cpu

      - name: Run require-real-adapters gate
        run: make real-no-fallback-gate WORKSPACE_ROOT=.

      - name: Upload real no-fallback gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-no-fallback-gate-artifact
          path: runs/ci/real_no_fallback_gate.json
          if-no-files-found: warn

      - name: Publish real no-fallback gate summary
        if: always()
        run: |
          echo "### Real No-Fallback Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f runs/ci/real_no_fallback_gate.json ]; then
            cat runs/ci/real_no_fallback_gate.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "real no-fallback gate output file is missing (likely upstream step failed)." >> "$GITHUB_STEP_SUMMARY"
          fi

  llm-backend-retry-guard:
    name: llm backend retry guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU profile
        run: ./scripts/install_profile.sh cpu

      - name: Run openai_compat retry guard tests
        run: |
          PYTHONPATH=src python3 -m unittest -v \
            tests.test_regressions.RegressionTests.test_agent_plan_llm_backend_openai_compat_retryable_http_code_retries \
            tests.test_regressions.RegressionTests.test_agent_plan_llm_backend_invalid_retry_env_fallback

  adapter-contract-guard:
    name: adapter contract guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU profile
        run: ./scripts/install_profile.sh cpu

      - name: Validate adapter templates contract
        run: |
          python3 scripts/adapters/validate_adapter_contract.py \
            --tool train_predictor \
            --cmd "python3 scripts/adapters/train_predictor_adapter_template.py" \
            --workspace-root . \
            --json
          python3 scripts/adapters/validate_adapter_contract.py \
            --tool generate_candidates \
            --cmd "python3 scripts/adapters/generate_candidates_adapter_template.py" \
            --workspace-root . \
            --json
          python3 scripts/adapters/validate_adapter_contract.py \
            --tool score_candidates \
            --cmd "python3 scripts/adapters/score_candidates_adapter_template.py" \
            --workspace-root . \
            --json

  make-entrypoint-guard:
    name: make entrypoint guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU profile
        run: ./scripts/install_profile.sh cpu

      - name: Run make entrypoints
        run: |
          make release-check TASK_ID=ci_release_check
          make real-adapter-validate

  acceptance-cpu-mock:
    name: acceptance cpu-mock
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU profile
        run: ./scripts/install_profile.sh cpu

      - name: Validate request templates
        run: make request-templates-validate

      - name: Run acceptance (cpu-mock)
        run: make release-check TASK_ID=ci_accept_cpu_mock

  acceptance-llm-mock:
    name: acceptance llm-mock
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU profile
        run: ./scripts/install_profile.sh cpu

      - name: Run acceptance (llm-mock)
        run: make llm-smoke

  agent4mat-ci:
    name: core regression gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Validate lockfiles
        run: python3 scripts/validate_lockfiles.py --requirements-dir requirements

      - name: Verify acceptance script entrypoints exist
        run: |
          test -f scripts/run_external_chain_acceptance.sh
          test -f scripts/run_external_chain_acceptance_with_debug.sh

      - name: Install CPU profile
        run: ./scripts/install_profile.sh cpu

      - name: Run regression tests
        run: PYTHONPATH=src python3 -m unittest -v tests.test_regressions

      - name: Check plan tool schema sync
        run: |
          mkdir -p runs/ci
          python3 scripts/sync_plan_tool_schema.py --check --json > runs/ci/plan_tool_schema_check.json

      - name: Upload schema-check artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plan-tool-schema-check
          path: runs/ci/plan_tool_schema_check.json
          if-no-files-found: warn

      - name: Publish schema-check summary
        if: always()
        run: |
          echo "### Plan Tool Schema Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f runs/ci/plan_tool_schema_check.json ]; then
            cat runs/ci/plan_tool_schema_check.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "schema-check output file is missing (likely upstream step failed)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check llm planner modes
        run: python3 scripts/check_llm_planner_modes.py

      - name: Run smoke pipeline
        run: PYTHONPATH=src python3 -m oled_agent.cli smoke --workspace-root .

      - name: Run agent end-to-end
        run: |
          mkdir -p runs/ci
          PYTHONPATH=src python3 -m oled_agent.cli agent-run \
            --workspace-root . \
            --task-id ci_smoke_task \
            --request "设计470nm附近且高PLQY分子" > runs/ci/agent_run_ci_smoke.json

      - name: Validate structured artifacts schema
        run: |
          python3 scripts/validate_run_artifacts.py \
            --workspace-root . \
            --result-json runs/ci/agent_run_ci_smoke.json

      - name: Generate experiment summary
        run: |
          mkdir -p runs/ci
          python3 scripts/summarize_experiments.py \
            --workspace-root . \
            --limit 50 \
            --json-out runs/ci/experiment_summary.json \
            --md-out runs/ci/experiment_summary.md \
            > runs/ci/experiment_summary_stdout.json

      - name: Upload experiment-summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-summary
          path: |
            runs/ci/experiment_summary.json
            runs/ci/experiment_summary.md
            runs/ci/experiment_summary_stdout.json
          if-no-files-found: warn

      - name: Publish experiment summary
        if: always()
        run: |
          echo "### Experiment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f runs/ci/experiment_summary.md ]; then
            cat runs/ci/experiment_summary.md >> "$GITHUB_STEP_SUMMARY"
          elif [ -f runs/ci/experiment_summary.json ]; then
            cat runs/ci/experiment_summary.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "experiment summary output file is missing (likely upstream step failed)." >> "$GITHUB_STEP_SUMMARY"
          fi

  external-chain-acceptance:
    name: acceptance external-adapter (optional)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_external_acceptance == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU profile
        run: ./scripts/install_profile.sh cpu

      - name: Verify acceptance script entrypoints exist
        run: |
          test -f scripts/run_external_chain_acceptance.sh
          test -f scripts/run_external_chain_acceptance_with_debug.sh

      - name: Run external-chain acceptance with debug artifacts
        env:
          OLED_AGENT_ACCEPTANCE_EXTERNAL: "1"
        run: ./scripts/run_external_chain_acceptance_with_debug.sh ci_external_acceptance

      - name: Upload external-chain debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-chain-debug-artifacts
          path: runs/external_chain_debug
          if-no-files-found: ignore

  real-chain-minimal-acceptance:
    name: acceptance real-chain-minimal (manual)
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_real_chain_acceptance == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU profile
        run: ./scripts/install_profile.sh cpu

      - name: Run minimal real-chain acceptance
        run: make real-chain-acceptance TASK_ID=ci_real_chain_manual

      - name: Collect real-chain release evidence
        run: |
          make real-chain-evidence \
            TASK_ID=ci_real_chain_manual \
            RESULT_JSON=runs/ci/agent_run_real_chain_ci_real_chain_manual.json

      - name: Upload real-chain acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-chain-minimal-artifacts
          path: |
            runs/ci/agent_run_real_chain_ci_real_chain_manual.json
            runs/ci/request_real_chain_minimal_ci_real_chain_manual.json
          if-no-files-found: ignore

      - name: Upload real-chain evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-chain-evidence-artifacts
          path: |
            runs/agent/ci_real_chain_manual/release_evidence.json
            runs/agent/ci_real_chain_manual/release_evidence.md
            runs/agent/ci_real_chain_manual/acceptance_result.json
            runs/agent/ci_real_chain_manual/external_debug.json
          if-no-files-found: ignore

  ui-freeze-acceptance:
    name: acceptance ui-freeze (manual)
    if: >
      github.event_name == 'workflow_dispatch' &&
      (
        github.event.inputs.run_ui_freeze_acceptance == 'true' ||
        github.event.inputs.run_ui_acceptance_bundle == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU profile
        run: ./scripts/install_profile.sh cpu

      - name: Run ui-freeze acceptance
        run: make ui-freeze-acceptance WORKSPACE_ROOT=.

      - name: Upload ui-freeze acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-freeze-acceptance-artifacts
          path: runs/ci/ui_freeze_acceptance.json
          if-no-files-found: warn

      - name: Publish ui-freeze acceptance summary
        if: always()
        run: |
          echo "### UI Freeze Acceptance" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f runs/ci/ui_freeze_acceptance.json ]; then
            cat runs/ci/ui_freeze_acceptance.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ui-freeze acceptance output file is missing (likely upstream step failed)." >> "$GITHUB_STEP_SUMMARY"
          fi

  ui-audit-acceptance:
    name: acceptance ui-audit (manual)
    if: >
      github.event_name == 'workflow_dispatch' &&
      (
        github.event.inputs.run_ui_audit_acceptance == 'true' ||
        github.event.inputs.run_ui_acceptance_bundle == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU profile
        run: ./scripts/install_profile.sh cpu

      - name: Run ui-audit acceptance
        run: make ui-audit-acceptance WORKSPACE_ROOT=.

      - name: Upload ui-audit acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-audit-acceptance-artifacts
          path: runs/ci/ui_audit_acceptance.json
          if-no-files-found: warn

      - name: Publish ui-audit acceptance summary
        if: always()
        run: |
          echo "### UI Audit Acceptance" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f runs/ci/ui_audit_acceptance.json ]; then
            cat runs/ci/ui_audit_acceptance.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ui-audit acceptance output file is missing (likely upstream step failed)." >> "$GITHUB_STEP_SUMMARY"
          fi

  ui-release-readiness:
    name: acceptance ui-release-readiness (manual)
    if: >
      github.event_name == 'workflow_dispatch' &&
      (
        github.event.inputs.run_ui_release_readiness == 'true' ||
        github.event.inputs.run_ui_acceptance_bundle == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CPU profile
        run: ./scripts/install_profile.sh cpu

      - name: Run ui-release-readiness
        run: make ui-release-readiness WORKSPACE_ROOT=.

      - name: Upload ui-release-readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-release-readiness-artifacts
          path: |
            runs/ci/ui_release_readiness.json
            runs/ci/ui_release_readiness.md
            runs/ci/ui_stability_smoke.json
            runs/ci/ui_freeze_acceptance.json
            runs/ci/ui_audit_acceptance.json
          if-no-files-found: warn

      - name: Publish ui-release-readiness summary
        if: always()
        run: |
          echo "### UI Release Readiness" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f runs/ci/ui_release_readiness.md ]; then
            cat runs/ci/ui_release_readiness.md >> "$GITHUB_STEP_SUMMARY"
          elif [ -f runs/ci/ui_release_readiness.json ]; then
            cat runs/ci/ui_release_readiness.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ui-release-readiness output file is missing (likely upstream step failed)." >> "$GITHUB_STEP_SUMMARY"
          fi

  ui-acceptance-bundle-summary:
    name: acceptance ui-bundle-summary (manual)
    if: >
      always() &&
      github.event_name == 'workflow_dispatch' &&
      (
        github.event.inputs.run_ui_acceptance_bundle == 'true' ||
        github.event.inputs.run_ui_freeze_acceptance == 'true' ||
        github.event.inputs.run_ui_audit_acceptance == 'true' ||
        github.event.inputs.run_ui_release_readiness == 'true'
      )
    needs:
      - ui-freeze-acceptance
      - ui-audit-acceptance
      - ui-release-readiness
    outputs:
      bundle_status: ${{ steps.bundle_outputs.outputs.bundle_status }}
      bundle_check_count: ${{ steps.bundle_outputs.outputs.bundle_check_count }}
      bundle_failure_count: ${{ steps.bundle_outputs.outputs.bundle_failure_count }}
      bundle_artifact_ready: ${{ steps.bundle_outputs.outputs.bundle_artifact_ready }}
      bundle_failure_names: ${{ steps.bundle_outputs.outputs.bundle_failure_names }}
      bundle_first_failure: ${{ steps.bundle_outputs.outputs.bundle_first_failure }}
      bundle_build_outcome: ${{ steps.build_bundle_verdict.outcome }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download ui-freeze acceptance artifacts
        if: always() && needs['ui-freeze-acceptance'].result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          name: ui-freeze-acceptance-artifacts
          path: .

      - name: Download ui-audit acceptance artifacts
        if: always() && needs['ui-audit-acceptance'].result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          name: ui-audit-acceptance-artifacts
          path: .

      - name: Download ui-release-readiness artifacts
        if: always() && needs['ui-release-readiness'].result != 'skipped'
        uses: actions/download-artifact@v4
        with:
          name: ui-release-readiness-artifacts
          path: .

      - name: Build ui acceptance bundle verdict
        id: build_bundle_verdict
        if: >
          always() &&
          !(
            needs['ui-freeze-acceptance'].result == 'skipped' &&
            needs['ui-audit-acceptance'].result == 'skipped' &&
            needs['ui-release-readiness'].result == 'skipped'
          )
        continue-on-error: true
        run: |
          mkdir -p runs/ci
          python scripts/check_ui_acceptance_bundle.py --workspace-root . --out-json runs/ci/ui_acceptance_bundle_summary.json --out-md runs/ci/ui_acceptance_bundle_summary.md

      - name: Upload ui acceptance bundle summary artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-acceptance-bundle-summary-artifacts
          path: |
            runs/ci/ui_acceptance_bundle_summary.json
            runs/ci/ui_acceptance_bundle_summary.md
          if-no-files-found: warn

      - name: Expose ui acceptance bundle outputs
        id: bundle_outputs
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path("runs/ci/ui_acceptance_bundle_summary.json")
          out_path = os.environ.get("GITHUB_OUTPUT", "")
          payload = {}
          status = "missing"
          check_count = -1
          failure_count = -1
          artifact_ready = "false"
          failure_names = ""
          first_failure = ""

          if summary_path.exists():
              artifact_ready = "true"
              try:
                  loaded = json.loads(summary_path.read_text(encoding="utf-8"))
                  if isinstance(loaded, dict):
                      payload = loaded
                      status = str(payload.get("status") or "unknown")
                      try:
                          check_count = int(payload.get("check_count"))
                      except Exception:
                          check_count = -1
                      try:
                          failure_count = int(payload.get("failure_count"))
                      except Exception:
                          failure_count = -1
                      failures = payload.get("failures")
                      if isinstance(failures, list):
                          names = []
                          for row in failures:
                              if not isinstance(row, dict):
                                  continue
                              name = str(row.get("name") or "").strip()
                              if not name:
                                  continue
                              names.append(name)
                          if names:
                              first_failure = names[0]
                              failure_names = ",".join(names[:12])
                  else:
                      status = "invalid_payload"
              except Exception:
                  status = "parse_error"
          if out_path:
              with open(out_path, "a", encoding="utf-8") as fh:
                  fh.write(f"bundle_status={status}\n")
                  fh.write(f"bundle_check_count={check_count}\n")
                  fh.write(f"bundle_failure_count={failure_count}\n")
                  fh.write(f"bundle_artifact_ready={artifact_ready}\n")
                  fh.write(f"bundle_failure_names={failure_names}\n")
                  fh.write(f"bundle_first_failure={first_failure}\n")
          print(
              json.dumps(
                  {
                      "bundle_status": status,
                      "bundle_check_count": check_count,
                      "bundle_failure_count": failure_count,
                      "bundle_artifact_ready": artifact_ready,
                      "bundle_failure_names": failure_names,
                      "bundle_first_failure": first_failure,
                  },
                  ensure_ascii=False,
              )
          )
          PY

      - name: Publish ui acceptance bundle summary
        if: always()
        run: |
          echo "### UI Acceptance Bundle Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- ui-freeze-acceptance: ${{ needs['ui-freeze-acceptance'].result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- ui-audit-acceptance: ${{ needs['ui-audit-acceptance'].result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- ui-release-readiness: ${{ needs['ui-release-readiness'].result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- build_bundle_verdict_step: ${{ steps.build_bundle_verdict.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- bundle_status: ${{ steps.bundle_outputs.outputs.bundle_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- bundle_check_count: ${{ steps.bundle_outputs.outputs.bundle_check_count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- bundle_failure_count: ${{ steps.bundle_outputs.outputs.bundle_failure_count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- bundle_failure_names: ${{ steps.bundle_outputs.outputs.bundle_failure_names }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- bundle_first_failure: ${{ steps.bundle_outputs.outputs.bundle_first_failure }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ needs['ui-freeze-acceptance'].result }}" = "skipped" ] && [ "${{ needs['ui-audit-acceptance'].result }}" = "skipped" ] && [ "${{ needs['ui-release-readiness'].result }}" = "skipped" ]; then
            echo "- note: all upstream UI jobs were skipped; bundle verdict build was skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ -f runs/ci/ui_acceptance_bundle_summary.md ]; then
            cat runs/ci/ui_acceptance_bundle_summary.md >> "$GITHUB_STEP_SUMMARY"
          elif [ -f runs/ci/ui_acceptance_bundle_summary.json ]; then
            cat runs/ci/ui_acceptance_bundle_summary.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ui-acceptance bundle summary output file is missing (likely upstream step failed)." >> "$GITHUB_STEP_SUMMARY"
          fi

  ui-acceptance-bundle-verify:
    name: acceptance ui-bundle-verify (manual)
    if: >
      always() &&
      github.event_name == 'workflow_dispatch' &&
      (
        github.event.inputs.run_ui_acceptance_bundle == 'true' ||
        github.event.inputs.run_ui_freeze_acceptance == 'true' ||
        github.event.inputs.run_ui_audit_acceptance == 'true' ||
        github.event.inputs.run_ui_release_readiness == 'true'
      )
    needs:
      - ui-acceptance-bundle-summary
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download ui acceptance bundle summary artifacts
        if: always() && needs['ui-acceptance-bundle-summary'].outputs.bundle_artifact_ready == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ui-acceptance-bundle-summary-artifacts
          path: .

      - name: Verify ui acceptance bundle artifact schema
        id: verify_bundle_artifact
        if: always() && needs['ui-acceptance-bundle-summary'].outputs.bundle_artifact_ready == 'true'
        run: |
          python scripts/check_ui_acceptance_bundle_artifact.py --workspace-root . --summary-json runs/ci/ui_acceptance_bundle_summary.json --summary-md runs/ci/ui_acceptance_bundle_summary.md --out-json runs/ci/ui_acceptance_bundle_artifact_verify.json

      - name: Upload ui acceptance bundle verify artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-acceptance-bundle-verify-artifacts
          path: runs/ci/ui_acceptance_bundle_artifact_verify.json
          if-no-files-found: warn

      - name: Publish ui acceptance bundle verify summary
        if: always()
        run: |
          echo "### UI Acceptance Bundle Verify" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- ui-acceptance-bundle-summary: ${{ needs['ui-acceptance-bundle-summary'].result }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- summary_bundle_status: ${{ needs['ui-acceptance-bundle-summary'].outputs.bundle_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- summary_bundle_check_count: ${{ needs['ui-acceptance-bundle-summary'].outputs.bundle_check_count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- summary_bundle_failure_count: ${{ needs['ui-acceptance-bundle-summary'].outputs.bundle_failure_count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- summary_bundle_first_failure: ${{ needs['ui-acceptance-bundle-summary'].outputs.bundle_first_failure }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- verify_bundle_artifact_step: ${{ steps.verify_bundle_artifact.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -f runs/ci/ui_acceptance_bundle_artifact_verify.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
            import json
            from pathlib import Path

            path = Path("runs/ci/ui_acceptance_bundle_artifact_verify.json")
            payload = json.loads(path.read_text(encoding="utf-8"))
            print("- verify_status: `{}`".format(payload.get("status")))
            print("- summary_status: `{}`".format(payload.get("summary_status")))
            print("- summary_check_count: `{}`".format(payload.get("summary_check_count")))
            print("- summary_failure_count: `{}`".format(payload.get("summary_failure_count")))
            categories = payload.get("failure_categories")
            if isinstance(categories, list) and categories:
                print("- failure_categories: `{}`".format(", ".join(str(x) for x in categories)))
            preview = payload.get("failure_preview")
            if isinstance(preview, list) and preview:
                first = preview[0]
                if isinstance(first, dict):
                    print("- first_failure: `{}`".format(first.get("name")))
                    print("- first_failure_detail: {}".format(first.get("message")))
            PY
          else
            echo "- verify artifact json missing" >> "$GITHUB_STEP_SUMMARY"
          fi
