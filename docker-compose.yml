name: oled-agent

services:
  oled-agent-cpu:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["cpu"]
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      bash -lc "PYTHONPATH=src python3 -m oled_agent.cli doctor --workspace-root /app"

  oled-agent-gpu:
    image: nvidia/cuda:12.1.1-cudnn8-runtime-ubuntu22.04
    profiles: ["gpu"]
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      - DEBIAN_FRONTEND=noninteractive
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TORCH_CUDA_INDEX_URL=https://download.pytorch.org/whl/cu121
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      bash -lc "apt-get update && apt-get install -y --no-install-recommends python3 python3-pip git bash ca-certificates build-essential && ./scripts/install_profile.sh gpu && PYTHONPATH=src python3 -m oled_agent.cli doctor --workspace-root /app"
